<!DOCTYPE html>
<html lang="en" dir="auto">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Assistant For Excel</title>
  <!--
    Office.js source is injected by webpack from OFFICE_JS_SRC env var.
    Default: Microsoft CDN (https://appsforoffice.microsoft.com/lib/1/hosted/office.js)
    Enclosed network: set OFFICE_JS_SRC=/assets/office.js and drop a local
    copy into frontend/public/assets/office.js before building. See AIRGAP.md.
  -->
  <script src="<%= htmlWebpackPlugin.options.officeJsSrc %>" type="text/javascript"></script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
