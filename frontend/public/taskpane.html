<!DOCTYPE html>
<html lang="en" dir="auto">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel AI Copilot</title>
  <!--
    Office.js loading strategy
    ─────────────────────────────────────────────────────────────────
    OPTION A (default, requires internet): load from Microsoft CDN.
      Pros: always up to date, no setup.
      Cons: breaks on enclosed/air-gapped networks.

    OPTION B (enclosed network / offline): self-host office.js.
      1. Download once (with internet access):
            npx office-addin-dev-certs install
            curl -o public/assets/office.js \
              https://appsforoffice.microsoft.com/lib/1/hosted/office.js
      2. Comment out Option A, uncomment Option B below.
      Note: self-hosted office.js won't auto-update; re-download periodically.

    OPTION C (LiteLLM proxy / corporate CDN mirror):
      Replace the src with your internal mirror URL.
    ─────────────────────────────────────────────────────────────────
  -->

  <!-- OPTION A — CDN (internet required) -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>

  <!-- OPTION B — self-hosted (uncomment for enclosed networks)
  <script src="/assets/office.js" type="text/javascript"></script>
  -->
</head>
<body>
  <div id="root"></div>
</body>
</html>
