# ─────────────────────────────────────────────────────────────────────────────
# Excel AI Copilot — GitLab CI/CD Pipeline
#
# Stages:
#   lint       → code style and type-checking (frontend + backend)
#   build      → production webpack build (frontend)
#   test       → unit tests (frontend jest + backend pytest)
#   security   → dependency vulnerability scanning
#   docker     → build Docker image and push to GitLab registry
#   deploy     → roll out to OpenShift (manual trigger)
#
# Required CI/CD Variables (Settings → CI/CD → Variables):
#   LLM_MODEL        — e.g. "claude-sonnet-4-20250514" or "gpt-4o"
#   LLM_API_KEY      — API key (mark as masked + protected)
#   FRONTEND_URL     — Public URL of the deployed add-in, e.g. https://copilot.mycompany.com
#   OPENSHIFT_SERVER  — cluster API URL (for deploy stage)
#   OPENSHIFT_TOKEN   — service account token with deploy permissions
#   OPENSHIFT_NS      — target namespace/project name
# ─────────────────────────────────────────────────────────────────────────────

stages:
  - lint
  - build
  - test
  - security
  - docker
  - deploy

# ── Shared variables ──────────────────────────────────────────────────────────
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  NODE_OPTIONS: "--max-old-space-size=4096"
  DOCKER_BUILDKIT: "1"

# ── Shared cache config ────────────────────────────────────────────────────────

.node-cache: &node-cache
  cache:
    key: "node-$CI_COMMIT_REF_SLUG"
    paths:
      - frontend/node_modules/

.python-cache: &python-cache
  cache:
    key: "python-$CI_COMMIT_REF_SLUG"
    paths:
      - .pip-cache/

# ── LINT ──────────────────────────────────────────────────────────────────────

lint:frontend:
  stage: lint
  image: node:20-alpine
  <<: *node-cache
  script:
    - cd frontend
    - npm ci --no-audit --no-fund
    - npx eslint src --ext .ts,.tsx
    - npx tsc --noEmit --skipLibCheck
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

lint:backend:
  stage: lint
  image: python:3.11-slim
  <<: *python-cache
  script:
    - pip install ruff mypy -q
    - pip install -r backend/requirements.txt -q
    - cd backend
    - ruff check app/ --ignore E501,I001,I002
    - mypy app/ --ignore-missing-imports --no-error-summary --no-strict-optional
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ── BUILD ─────────────────────────────────────────────────────────────────────

build:frontend:
  stage: build
  image: node:20-alpine
  <<: *node-cache
  script:
    - cd frontend
    - npm ci --no-audit --no-fund
    - FRONTEND_URL=${FRONTEND_URL:-https://localhost:3000} npm run build
  artifacts:
    name: "frontend-dist-$CI_COMMIT_SHORT_SHA"
    paths:
      - frontend/dist/
    expire_in: 2 hours
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ── TEST ──────────────────────────────────────────────────────────────────────

test:frontend:
  stage: test
  image: node:20-alpine
  <<: *node-cache
  script:
    - cd frontend
    - npm ci --no-audit --no-fund
    - npm test -- --ci --passWithNoTests --coverageReporters=text-summary
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

test:backend:
  stage: test
  image: python:3.11-slim
  <<: *python-cache
  script:
    - pip install -r backend/requirements.txt -q
    - cd backend
    - python -m pytest tests/ -v --tb=short --no-header
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ── SECURITY SCANNING ────────────────────────────────────────────────────────

security:backend:
  stage: security
  image: python:3.11-slim
  <<: *python-cache
  script:
    - pip install pip-audit -q
    - pip install -r backend/requirements.txt -q
    - pip-audit --strict --desc || true
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

security:frontend:
  stage: security
  image: node:20-alpine
  <<: *node-cache
  script:
    - cd frontend
    - npm ci --no-audit --no-fund
    - npm audit --production --audit-level=high || true
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ── DOCKER ────────────────────────────────────────────────────────────────────

docker:build:
  stage: docker
  image: docker:26
  services:
    - docker:26-dind
  needs:
    - job: build:frontend
      artifacts: true
    - job: test:frontend
    - job: test:backend
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    IMAGE_LATEST: "$CI_REGISTRY_IMAGE:latest"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      docker build \
        --build-arg FRONTEND_URL="${FRONTEND_URL:-https://localhost:3000}" \
        --cache-from "$IMAGE_LATEST" \
        --tag "$IMAGE" \
        --tag "$IMAGE_LATEST" \
        .
    - docker push "$IMAGE"
    - docker push "$IMAGE_LATEST"
    # Tag with semantic version if this is a git tag
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "$IMAGE" "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
        docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
      fi
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

# ── DEPLOY ───────────────────────────────────────────────────────────────────
# Triggered manually from the pipeline UI.
#
# First-time setup:
#   1. oc create secret generic excel-copilot-secrets --from-literal=LLM_API_KEY='...'
#   2. Edit openshift/configmap.yaml with your CORS_ORIGINS and LLM_MODEL
#   3. Edit openshift/route.yaml with your cluster host (optional)
#   4. Run this job — it applies all manifests and sets the image

deploy:openshift:
  stage: deploy
  image: registry.access.redhat.com/ubi8/oc-minimal:latest
  needs: [docker:build]
  environment:
    name: production
    url: $FRONTEND_URL
  variables:
    IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  script:
    - oc login "$OPENSHIFT_SERVER" --token="$OPENSHIFT_TOKEN" --insecure-skip-tls-verify
    - oc project "$OPENSHIFT_NS"
    # Apply manifests (idempotent — safe to re-run)
    - oc apply -f openshift/pvc.yaml
    - oc apply -f openshift/configmap.yaml
    - oc apply -f openshift/deployment.yaml
    - oc apply -f openshift/service.yaml
    - oc apply -f openshift/route.yaml
    # Update the image to the newly built one
    - oc set image deployment/excel-copilot excel-copilot="$IMAGE"
    - oc rollout status deployment/excel-copilot --timeout=180s
    # Print the route for easy access
    - echo "Deployed! Route:"
    - oc get route excel-copilot -o jsonpath='https://{.spec.host}{"\n"}'
    - echo "Manifest URL (for Excel add-in installation):"
    - oc get route excel-copilot -o jsonpath='https://{.spec.host}/manifest.xml{"\n"}'
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $OPENSHIFT_SERVER'
      when: manual
    - if: '$CI_COMMIT_TAG && $OPENSHIFT_SERVER'
      when: manual
