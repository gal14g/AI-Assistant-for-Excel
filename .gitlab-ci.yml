# ─────────────────────────────────────────────────────────────────────────────
# Excel AI Copilot — GitLab CI/CD Pipeline
#
# Stages:
#   lint       → code style and type-checking (frontend + backend)
#   build      → production webpack build (frontend)
#   test       → unit tests (frontend jest + backend pytest)
#   connect    → verify LLM API connectivity (non-blocking)
#   docker     → build Docker image and push to GitLab registry
#
# Required CI/CD Variables (Settings → CI/CD → Variables):
#   LLM_MODEL      — e.g. "ollama/llama3" or "gpt-4o"
#   LLM_API_KEY    — API key (leave empty for Ollama/local models)
#   LLM_BASE_URL   — Base URL for local/proxy endpoints (empty for OpenAI/Anthropic)
#   FRONTEND_URL   — Public URL of the deployed add-in, e.g. https://copilot.mycompany.com
#                    Used to bake the correct URL into manifest.xml during Docker build.
#
# Optional Variables:
#   OPENSHIFT_SERVER   — OpenShift API server URL (for deploy stage)
#   OPENSHIFT_TOKEN    — Service account token for oc login
#   OPENSHIFT_NS       — OpenShift project/namespace
# ─────────────────────────────────────────────────────────────────────────────

stages:
  - lint
  - build
  - test
  - connect
  - docker

# ── Shared cache keys ──────────────────────────────────────────────────────────

.node-cache: &node-cache
  cache:
    key: "node-$CI_COMMIT_REF_SLUG"
    paths:
      - frontend/node_modules/
    policy: pull-push

.python-cache: &python-cache
  cache:
    key: "python-$CI_COMMIT_REF_SLUG"
    paths:
      - backend/.pip-cache/
    policy: pull-push

# ── LINT ──────────────────────────────────────────────────────────────────────

lint:frontend:
  stage: lint
  image: node:20-alpine
  <<: *node-cache
  before_script:
    - cd frontend
    - npm ci --prefer-offline
  script:
    # ESLint — catches code style issues
    - npx eslint src --ext .ts,.tsx --max-warnings 0
    # TypeScript compiler — catches type errors without emitting files
    - npx tsc --noEmit
  rules:
    - changes:
        - frontend/**/*
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

lint:backend:
  stage: lint
  image: python:3.11-slim
  <<: *python-cache
  before_script:
    - pip install --cache-dir backend/.pip-cache ruff mypy -q
    - pip install --cache-dir backend/.pip-cache -r backend/requirements.txt -q
  script:
    - cd backend
    # Ruff — fast Python linter (replaces flake8 + isort + pyupgrade)
    - ruff check app/ --select E,F,W,I,N --ignore E501
    # Mypy — static type checking
    - mypy app/ --ignore-missing-imports --no-error-summary
  rules:
    - changes:
        - backend/**/*
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# ── BUILD ─────────────────────────────────────────────────────────────────────

build:frontend:
  stage: build
  image: node:20-alpine
  <<: *node-cache
  before_script:
    - cd frontend
    - npm ci --prefer-offline
  script:
    - FRONTEND_URL=${FRONTEND_URL:-https://localhost:3000} npm run build
  artifacts:
    name: "frontend-dist-$CI_COMMIT_SHORT_SHA"
    paths:
      - frontend/dist/
    expire_in: 2 hours
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ── TEST ──────────────────────────────────────────────────────────────────────

test:frontend:
  stage: test
  image: node:20-alpine
  <<: *node-cache
  before_script:
    - cd frontend
    - npm ci --prefer-offline
  script:
    - npm test -- --ci --coverage --coverageReporters=text-summary
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'
  rules:
    - changes:
        - frontend/src/**/*
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

test:backend:
  stage: test
  image: python:3.11-slim
  <<: *python-cache
  before_script:
    - pip install --cache-dir backend/.pip-cache -r backend/requirements.txt -q
  script:
    - cd backend
    - python -m pytest tests/ -v --tb=short --no-header
  coverage: '/TOTAL.+\s(\d+)%/'
  rules:
    - changes:
        - backend/**/*
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# ── CONNECTIVITY CHECK ────────────────────────────────────────────────────────
# Verifies the configured LLM endpoint is reachable and responds to a minimal
# completion request. Allowed to fail so it doesn't block a deploy if the CI
# runner has no access to the LLM provider (common in air-gapped environments).

connect:llm:
  stage: connect
  image: python:3.11-slim
  before_script:
    - pip install litellm httpx -q
  script:
    - python backend/scripts/check_llm_connectivity.py
  variables:
    LLM_MODEL: ${LLM_MODEL:-"ollama/llama3"}
    LLM_API_KEY: ${LLM_API_KEY:-""}
    LLM_BASE_URL: ${LLM_BASE_URL:-""}
  allow_failure: true    # LLM may not be reachable from CI runner
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

connect:backend-health:
  stage: connect
  image: python:3.11-slim
  before_script:
    - pip install httpx -q
  script:
    # Start the backend in the background, wait for it to be ready, then probe /health
    - pip install -r backend/requirements.txt -q
    - |
      cd backend
      LLM_MODEL=${LLM_MODEL:-"ollama/llama3"} uvicorn main:app --host 127.0.0.1 --port 8765 &
      SERVER_PID=$!
      # Wait up to 15 s for the server to start
      for i in $(seq 1 15); do
        sleep 1
        if python -c "import httpx; r = httpx.get('http://127.0.0.1:8765/health', timeout=2); r.raise_for_status(); print('Health OK:', r.json())" 2>/dev/null; then
          break
        fi
        echo "Waiting for server... ($i/15)"
      done
      kill $SERVER_PID
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

# ── DOCKER ────────────────────────────────────────────────────────────────────

docker:build:
  stage: docker
  image: docker:26
  services:
    - docker:26-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    IMAGE_LATEST: "$CI_REGISTRY_IMAGE:latest"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      docker build \
        --build-arg FRONTEND_URL="${FRONTEND_URL:-https://localhost:3000}" \
        --cache-from "$IMAGE_LATEST" \
        --tag "$IMAGE" \
        --tag "$IMAGE_LATEST" \
        .
    - docker push "$IMAGE"
    - docker push "$IMAGE_LATEST"
  needs:
    - job: build:frontend
      artifacts: false   # Docker build re-runs npm build inside the image
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

