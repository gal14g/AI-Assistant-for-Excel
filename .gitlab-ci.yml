# ─────────────────────────────────────────────────────────────────────────────
# Excel AI Copilot — GitLab CI/CD Pipeline
#
# Stages:
#   lint       → code style and type-checking (frontend + backend)
#   build      → production webpack build (frontend)
#   test       → unit tests (frontend jest + backend pytest)
#   connect    → verify LLM API connectivity (non-blocking)
#   docker     → build Docker image and push to GitLab registry
#
# Required CI/CD Variables (Settings → CI/CD → Variables):
#   LLM_MODEL      — e.g. "ollama/llama3" or "gpt-4o"
#   LLM_API_KEY    — API key (leave empty for Ollama/local models)
#   LLM_BASE_URL   — Base URL for local/proxy endpoints (empty for OpenAI/Anthropic)
#   FRONTEND_URL   — Public URL of the deployed add-in, e.g. https://copilot.mycompany.com
# ─────────────────────────────────────────────────────────────────────────────

stages:
  - lint
  - build
  - test
  - connect
  - docker

# ── Shared cache config ────────────────────────────────────────────────────────

.node-cache: &node-cache
  cache:
    key: "node-$CI_COMMIT_REF_SLUG"
    paths:
      - frontend/node_modules/

.python-cache: &python-cache
  cache:
    key: "python-$CI_COMMIT_REF_SLUG"
    paths:
      - .pip-cache/

# ── LINT ──────────────────────────────────────────────────────────────────────

lint:frontend:
  stage: lint
  image: node:20-alpine
  <<: *node-cache
  script:
    - cd frontend
    - npm ci --no-audit --no-fund
    - npx eslint src --ext .ts,.tsx
    - npx tsc --noEmit --skipLibCheck
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

lint:backend:
  stage: lint
  image: python:3.11-slim
  <<: *python-cache
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  script:
    - pip install ruff mypy -q
    - pip install -r backend/requirements.txt -q
    - cd backend
    - ruff check app/ --ignore E501,I001,I002
    - mypy app/ --ignore-missing-imports --no-error-summary --no-strict-optional
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ── BUILD ─────────────────────────────────────────────────────────────────────

build:frontend:
  stage: build
  image: node:20-alpine
  <<: *node-cache
  script:
    - cd frontend
    - npm ci --no-audit --no-fund
    - FRONTEND_URL=${FRONTEND_URL:-https://localhost:3000} npm run build
  artifacts:
    name: "frontend-dist-$CI_COMMIT_SHORT_SHA"
    paths:
      - frontend/dist/
    expire_in: 2 hours
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ── TEST ──────────────────────────────────────────────────────────────────────

test:frontend:
  stage: test
  image: node:20-alpine
  <<: *node-cache
  script:
    - cd frontend
    - npm ci --no-audit --no-fund
    - npm test -- --ci --passWithNoTests --coverageReporters=text-summary
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

test:backend:
  stage: test
  image: python:3.11-slim
  <<: *python-cache
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  script:
    - pip install -r backend/requirements.txt -q
    - cd backend
    - python -m pytest tests/ -v --tb=short --no-header
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ── CONNECTIVITY CHECK ────────────────────────────────────────────────────────

connect:llm:
  stage: connect
  image: python:3.11-slim
  script:
    - pip install litellm -q
    - python backend/scripts/check_llm_connectivity.py
  variables:
    LLM_MODEL: ${LLM_MODEL:-"ollama/llama3"}
    LLM_API_KEY: ${LLM_API_KEY:-""}
    LLM_BASE_URL: ${LLM_BASE_URL:-""}
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

connect:backend-health:
  stage: connect
  image: python:3.11-slim
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  script:
    - pip install -r backend/requirements.txt -q
    - |
      cd backend
      LLM_MODEL=${LLM_MODEL:-"ollama/llama3"} uvicorn main:app --host 127.0.0.1 --port 8765 &
      SERVER_PID=$!
      for i in $(seq 1 15); do
        sleep 1
        if python -c "import httpx; r=httpx.get('http://127.0.0.1:8765/health',timeout=2); r.raise_for_status(); print('Health OK:',r.json())" 2>/dev/null; then
          break
        fi
        echo "Waiting for server... ($i/15)"
      done
      kill $SERVER_PID 2>/dev/null || true
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

# ── DOCKER ────────────────────────────────────────────────────────────────────

docker:build:
  stage: docker
  image: docker:26
  services:
    - docker:26-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    IMAGE_LATEST: "$CI_REGISTRY_IMAGE:latest"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      docker build \
        --build-arg FRONTEND_URL="${FRONTEND_URL:-https://localhost:3000}" \
        --cache-from "$IMAGE_LATEST" \
        --tag "$IMAGE" \
        --tag "$IMAGE_LATEST" \
        .
    - docker push "$IMAGE"
    - docker push "$IMAGE_LATEST"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

