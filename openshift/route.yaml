# TLS edge termination — OpenShift handles HTTPS at the Route,
# the app receives plain HTTP on port 8080.
#
# Replace the host with your actual cluster domain.
# Users access: https://excel-assistant.apps.<cluster-domain>/manifest.xml
# to install the Excel add-in.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: excel-assistant
  labels:
    app: excel-assistant
    app.kubernetes.io/name: excel-assistant
    app.kubernetes.io/part-of: ai-assistant-for-excel
  annotations:
    haproxy.router.openshift.io/hsts_header: "max-age=31536000;includeSubDomains"
    haproxy.router.openshift.io/timeout: 120s
    # Large responses for LLM plans
    haproxy.router.openshift.io/balance: leastconn
spec:
  # Uncomment and set your cluster domain:
  # host: excel-assistant.apps.your-cluster.example.com
  to:
    kind: Service
    name: excel-assistant
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
