# Secrets — DO NOT commit real values to git.
#
# Preferred: create via CLI (avoids secrets in YAML files):
#   oc create secret generic excel-assistant-secrets \
#     --from-literal=LLM_API_KEY='your-api-key-here'
#
# Or apply this template after replacing the placeholder:
apiVersion: v1
kind: Secret
metadata:
  name: excel-assistant-secrets
  labels:
    app: excel-assistant
    app.kubernetes.io/name: excel-assistant
    app.kubernetes.io/part-of: ai-assistant-for-excel
type: Opaque
stringData:
  LLM_API_KEY: "REPLACE_WITH_YOUR_API_KEY"
