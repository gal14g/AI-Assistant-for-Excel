# Non-secret configuration — safe to store in git.
# Edit values before applying to your cluster.
apiVersion: v1
kind: ConfigMap
metadata:
  name: excel-copilot-config
  labels:
    app: excel-copilot
    app.kubernetes.io/name: excel-copilot
    app.kubernetes.io/part-of: excel-ai-copilot
data:
  OPENSHIFT: "true"
  SERVE_STATIC: "true"
  STATIC_DIR: "./static"
  PORT: "8080"
  DEBUG: "false"

  # LLM provider — set to your model string (LiteLLM format):
  #   OpenAI:    gpt-4o
  #   Anthropic: claude-sonnet-4-20250514
  #   Cohere:    command-a-03-2025
  #   Ollama:    ollama/llama3
  LLM_MODEL: "gpt-4o"
  LLM_MAX_TOKENS: "4096"
  LLM_TEMPERATURE: "0.1"
  LLM_JSON_MODE: "false"

  # Set if using Ollama / proxy / Azure:
  LLM_BASE_URL: ""
  LLM_API_VERSION: ""

  # Embedding model for semantic search (downloaded on first startup ~80MB):
  EMBEDDING_MODEL: "all-MiniLM-L6-v2"
  CAPABILITY_TOP_K: "10"
  FEW_SHOT_TOP_K: "5"

  # CORS — set to your actual deployed add-in URL.
  # In OpenShift the frontend is same-origin, but Office.js iframes may need this.
  CORS_ORIGINS: '["https://excel-copilot.apps.your-cluster.example.com"]'
